server {
    listen 8443 ssl;
    server_name server.local;

    ssl_certificate     /etc/ssl/server.local/cert.pem;
    ssl_certificate_key /etc/ssl/server.local/key.pem;

    # Force immediate delivery of each SSE chunk. Without this the kernel's
    # Nagle algorithm coalesces multiple small segments into one packet,
    # collapsing the per-iteration boundaries the attack relies on.
    tcp_nodelay on;

    # Disable all nginx-side buffering and compression so each chunk from
    # llama.cpp is forwarded as its own TLS record without accumulation.
    proxy_buffering  off;
    proxy_cache      off;
    gzip             off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}
