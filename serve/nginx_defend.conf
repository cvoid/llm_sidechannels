# Defense endpoints. Install alongside serve/nginx.conf.
# The undefended path on :8443 is unchanged.
#
# :8444 -> aggregation proxy (:8082) -> llama.cpp:8080
#   uv run python -m defend.aggregate --batch-size 4
#
# :8445 -> padding proxy (:8083) -> llama.cpp:8080
#   uv run python -m defend.pad --mode random --max-pad 512
#   uv run python -m defend.pad --mode fixed --fixed-size 2048
#
# :8446 -> CBR chunk proxy (:8084) -> llama.cpp:8080
#   uv run python -m defend.cbr --chunk-size 512 --interval-ms 20
#   uv run python -m defend.cbr --chunk-size 512 --interval-ms 0   # burst
#
# Reload nginx after starting the proxy:
#   sudo nginx -s reload

server {
    listen 8444 ssl;
    server_name server.local;

    ssl_certificate     /etc/ssl/server.local/cert.pem;
    ssl_certificate_key /etc/ssl/server.local/key.pem;

    # Same forwarding settings as the undefended block. tcp_nodelay and
    # proxy_buffering off are still required -- the aggregation happens
    # inside the proxy at the application layer, not here.
    tcp_nodelay on;
    proxy_buffering  off;
    proxy_cache      off;
    gzip             off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}

server {
    listen 8445 ssl;
    server_name server.local;

    ssl_certificate     /etc/ssl/server.local/cert.pem;
    ssl_certificate_key /etc/ssl/server.local/key.pem;

    tcp_nodelay on;
    proxy_buffering  off;
    proxy_cache      off;
    gzip             off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}

server {
    listen 8446 ssl;
    server_name server.local;

    ssl_certificate     /etc/ssl/server.local/cert.pem;
    ssl_certificate_key /etc/ssl/server.local/key.pem;

    tcp_nodelay on;
    proxy_buffering  off;
    proxy_cache      off;
    gzip             off;
    # CBR proxy buffers the full response before sending, so generation
    # time plus (response_size / chunk_size) * interval_ms can exceed 300s
    # for long responses.
    proxy_read_timeout 600s;

    location / {
        proxy_pass         http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}
