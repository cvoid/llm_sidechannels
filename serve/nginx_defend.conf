# Defense endpoint: nginx:8444 (TLS) -> aggregation proxy:8082 -> llama.cpp:8080
#
# Install alongside the existing nginx.conf server block.
# The undefended path on :8443 is unchanged; this adds a second server block
# on :8444 that routes through the token aggregation proxy.
#
# After starting the aggregation proxy:
#   uv run python -m defend.aggregate --batch-size 4
#
# Reload nginx:
#   sudo nginx -s reload
#
# Profile against the defended endpoint:
#   uv run python tools/profile.py --port 8444 --out-dir data/raw_defend/batch4/temp_0.3

server {
    listen 8444 ssl;
    server_name server.local;

    ssl_certificate     /etc/ssl/server.local/cert.pem;
    ssl_certificate_key /etc/ssl/server.local/key.pem;

    # Same forwarding settings as the undefended block. tcp_nodelay and
    # proxy_buffering off are still required -- the aggregation happens
    # inside the proxy at the application layer, not here.
    tcp_nodelay on;
    proxy_buffering  off;
    proxy_cache      off;
    gzip             off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}
